yamlname: ClearFlow Nightly Updatename: ClearFlow Nightly Update

on:
  schedule:
    # 13:00 UTC ≈ 9:00am US Eastern (EDT). Shifts to 8am during EST (Nov–Mar).
    # Adjust the cron below, or trigger manually any time via workflow_dispatch.
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run nightly research update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/nightly-update.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "clearflow-bot"
          git config user.email "actions@users.noreply.github.com"
          git add clearflow-dashboard.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated nightly update: $(date -u +%Y-%m-%d)"
            git push
          fi

